name: Cache CI

on:
  push:
    branches:
      - main

jobs:
  cache-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        id: cache_step
        uses: actions/cache@v4
        with:
          path: ~/.cache/demo
          key: cache-65bb291

      - name: prime-cache-65bb291
        run: |
          echo Cache hit: ${{ steps.cache_step.outputs.cache-hit }}